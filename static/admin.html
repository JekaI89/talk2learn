<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Talk2Learn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">⚙️ Admin Panel</h1>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="showTab('stats')" class="px-6 py-2 bg-zinc-800 rounded-2xl text-sm font-medium hover:bg-zinc-700 transition-colors">Статистика</button>
            <button onclick="showTab('users')" class="px-6 py-2 bg-zinc-800 rounded-2xl text-sm font-medium hover:bg-zinc-700 transition-colors">Пользователи</button>
            <button onclick="showTab('lessons')" class="px-6 py-2 bg-zinc-800 rounded-2xl text-sm font-medium hover:bg-zinc-700 transition-colors">Уроки</button>
            <button onclick="showTab('questions')" class="px-6 py-2 bg-zinc-800 rounded-2xl text-sm font-medium hover:bg-zinc-700 transition-colors">Вопросы</button>
            <button onclick="showTab('vocab')" class="px-6 py-2 bg-zinc-800 rounded-2xl text-sm font-medium hover:bg-zinc-700 transition-colors">📚 Словарь</button>
            <button onclick="closeAdmin()" class="px-6 py-2 bg-red-950/60 text-red-400 border border-red-900/50 rounded-2xl text-sm font-semibold hover:bg-red-900 hover:text-red-100 transition-colors ml-auto">
                ◀ Назад в Академию
            </button>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="bg-zinc-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4">📊 Статистика</h2>
                <div id="stats-content">Загрузка...</div>
            </div>
        </div>

        <div id="tab-users" class="tab-content hidden">
            <div class="bg-zinc-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4">👤 Управление пользователями</h2>
                <input id="user-input" placeholder="@username или Telegram ID" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="manageUser('grant_premium')" class="bg-emerald-600 py-4 rounded-2xl">Дать Premium</button>
                    <button onclick="manageUser('revoke_premium')" class="bg-red-600 py-4 rounded-2xl">Снять Premium</button>
                    <button onclick="manageUser('grant_admin')" class="bg-yellow-600 py-4 rounded-2xl">Сделать Админом</button>
                    <button onclick="manageUser('revoke_admin')" class="bg-gray-600 py-4 rounded-2xl">Снять Админа</button>
                </div>
            </div>
        </div>

        <div id="tab-lessons" class="tab-content hidden">
            <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4">➕ Добавить урок / Грамматику / Практику</h2>
                
                <input id="lesson-title" placeholder="Название урока" class="w-full bg-zinc-800 p-4 rounded-2xl mb-3">
                
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Уровень</label>
                        <select id="lesson-level" class="w-full bg-zinc-800 p-4 rounded-2xl">
                            <option value="A1">A1</option>
                            <option value="A2">A2</option>
                            <option value="B1">B1</option>
                            <option value="B2">B2</option>
                            <option value="C1">C1</option>
                            <option value="C2">C2</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Тип</label>
                        <select id="lesson-type" class="w-full bg-zinc-800 p-4 rounded-2xl">
                            <option value="lesson">📚 Урок</option>
                            <option value="grammar">📖 Грамматика</option>
                            <option value="practice">🎯 Практика (тест)</option>
                        </select>
                    </div>
                </div>

                <textarea id="lesson-text" placeholder="Текст урока (опционально)" class="w-full bg-zinc-800 p-4 rounded-3xl h-32 mb-4"></textarea>
                <button onclick="addLesson()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">Добавить урок</button>
            </div>

            <div class="bg-zinc-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4">📋 Текущие уроки</h2>
                <div id="lessons-list" class="space-y-2 max-h-96 overflow-y-auto pr-2">
                    <div class="text-zinc-500">Загрузка уроков...</div>
                </div>
            </div>
        </div>

        <div id="tab-questions" class="tab-content hidden">
            <div class="bg-zinc-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4">❓ Добавить вопрос (Multiple Choice)</h2>
                <select id="q-lesson" class="w-full bg-zinc-800 p-4 rounded-2xl mb-3" onchange="onLessonSelect()">
                    <option value="">-- Выбери урок --</option>
                </select>
                <div id="q-level-hint" class="text-sm text-zinc-400 mb-3"></div>
                <input id="q-text" placeholder="Текст вопроса" class="w-full bg-zinc-800 p-4 rounded-2xl mb-3">
                <input id="q-opt1" placeholder="Вариант 1" class="w-full bg-zinc-800 p-4 rounded-2xl mb-2">
                <input id="q-opt2" placeholder="Вариант 2" class="w-full bg-zinc-800 p-4 rounded-2xl mb-2">
                <input id="q-opt3" placeholder="Вариант 3" class="w-full bg-zinc-800 p-4 rounded-2xl mb-3">
                <select id="q-correct" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4">
                    <option value="1">Правильный ответ: Вариант 1</option>
                    <option value="2">Правильный ответ: Вариант 2</option>
                    <option value="3">Правильный ответ: Вариант 3</option>
                </select>
                <button onclick="addQuestion()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold">Добавить вопрос</button>
            </div>
        </div>

        <!-- ── ВКЛАДКА: СЛОВАРЬ ──────────────────────────── -->
        <div id="tab-vocab" class="tab-content hidden space-y-6">

            <!-- Форма добавления карточки -->
            <div class="bg-zinc-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-4">➕ Добавить карточку</h2>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input id="vc-word" placeholder="Слово (EN)" class="bg-zinc-800 p-3 rounded-2xl col-span-1">
                    <input id="vc-translation" placeholder="Перевод (RU)" class="bg-zinc-800 p-3 rounded-2xl col-span-1">
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input id="vc-topic" placeholder="Тема (Animals, Food...)" class="bg-zinc-800 p-3 rounded-2xl">
                    <input id="vc-emoji" placeholder="Emoji code (1F415)" class="bg-zinc-800 p-3 rounded-2xl font-mono">
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <select id="vc-level" class="bg-zinc-800 p-3 rounded-2xl">
                        <option value="A1">A1</option><option value="A2">A2</option>
                        <option value="B1">B1</option><option value="B2">B2</option>
                        <option value="C1">C1</option><option value="C2">C2</option>
                    </select>
                    <input id="vc-order" type="number" placeholder="Порядок (0)" value="0" class="bg-zinc-800 p-3 rounded-2xl">
                </div>
                <input id="vc-definition" placeholder="Значение на английском (необязательно)" class="w-full bg-zinc-800 p-3 rounded-2xl mb-3">

                <!-- Превью -->
                <div class="flex items-center gap-3 mb-4 bg-zinc-800 rounded-2xl p-3">
                    <img id="vc-preview-img" src="" alt="" class="w-12 h-12 object-contain hidden">
                    <span id="vc-preview-emoji" class="text-4xl hidden"></span>
                    <div>
                        <div id="vc-preview-word" class="font-bold text-white text-sm">— введите данные выше</div>
                        <div id="vc-preview-tr" class="text-blue-400 text-xs"></div>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="previewVocabCard()" class="flex-1 bg-zinc-700 py-3 rounded-2xl font-bold text-sm hover:bg-zinc-600">👁 Превью</button>
                    <button onclick="addVocabCard()" class="flex-1 bg-emerald-600 py-3 rounded-2xl font-bold text-sm hover:bg-emerald-500">+ Добавить</button>
                </div>
                <div id="vc-add-status" class="text-center text-sm mt-2 min-h-[20px]"></div>
            </div>

            <!-- Таблица карточек -->
            <div class="bg-zinc-900 rounded-3xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">📋 Все карточки</h2>
                    <button onclick="loadAdminVocab()" class="text-xs bg-zinc-700 px-4 py-2 rounded-xl hover:bg-zinc-600">Обновить</button>
                </div>
                <div id="vocab-admin-list" class="space-y-2 max-h-[500px] overflow-y-auto pr-1"></div>
            </div>
        </div>

    </div>

    <script>
        let lessonsData = [];

        // Инициализация Telegram WebApp API
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // Разворачиваем на весь экран для удобства админки
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');

            if (tab === 'lessons') loadAdminLessonsList();
            if (tab === 'vocab') loadAdminVocab();
        }

        function closeAdmin() {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.close();
            } else {
                alert("Эта кнопка работает только внутри Telegram Mini App!");
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                
                let levelsHtml = '';
                if (data.levels) {
                    for (const [lvl, count] of Object.entries(data.levels)) {
                        levelsHtml += `Уроков ${lvl}: <b>${count}</b><br>`;
                    }
                }

                document.getElementById('stats-content').innerHTML = `
                    Пользователей: <b>${data.total_users || 0}</b><br>
                    Premium: <b>${data.premium_users || 0}</b><br>
                    Свободных: <b>${data.free_users || 0}</b><br>
                    <hr class="border-zinc-800 my-3">
                    ${levelsHtml}
                `;
            } catch (err) {
                console.error("Ошибка загрузки статистики:", err);
            }
        }

        async function loadAdminLessonsList() {
            try {
                const res = await fetch('/api/admin/lessons');
                const lessons = await res.json();
                const container = document.getElementById('lessons-list');
                
                if (lessons.length === 0) {
                    container.innerHTML = '<div class="text-zinc-500 py-2">Уроков пока нет</div>';
                    return;
                }
                
                container.innerHTML = '';
                lessons.forEach(l => {
                    const typeLabels = { 'lesson': '📚 Урок', 'grammar': '📖 Грамм.', 'practice': '🎯 Практ.' };
                    const label = typeLabels[l.type] || l.type;

                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between bg-zinc-800 p-4 rounded-xl border border-zinc-700/50 hover:border-zinc-600 transition-all";
                    row.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="px-2 py-1 bg-zinc-700 text-xs font-bold rounded-lg text-yellow-400">${l.level}</span>
                            <span class="text-sm font-medium">${l.title}</span>
                            <span class="text-xs text-zinc-400 hidden sm:inline">${label}</span>
                        </div>
                        <button onclick="deleteLessonById(${l.id})" class="px-3 py-1.5 bg-red-950/40 text-red-400 hover:bg-red-900 hover:text-red-100 rounded-xl text-xs font-semibold transition-colors">
                            🗑️ Удалить
                        </button>
                    `;
                    container.appendChild(row);
                });
            } catch (err) {
                console.error("Ошибка загрузки списка уроков:", err);
            }
        }

        async function deleteLessonById(lessonId) {
            if (!confirm("Вы действительно хотите удалить этот урок? Он будет скрыт из доступа пользователей.")) return;

            try {
                const res = await fetch(`/api/admin/delete_lesson/${lessonId}`, { method: 'DELETE' });
                const result = await res.json();

                if (result.status === 'success') {
                    await loadAdminLessonsList();
                    await loadLessonsForSelect();
                    await loadStats();
                } else {
                    alert("Ошибка: " + result.message);
                }
            } catch (error) {
                console.error("Ошибка при удалении урока:", error);
                alert("Не удалось удалить урок");
            }
        }

        async function loadLessonsForSelect() {
            try {
                const res = await fetch('/api/admin/lessons_for_questions');
                lessonsData = await res.json();
                const select = document.getElementById('q-lesson');
                select.innerHTML = '<option value="">-- Выбери урок --</option>';
                lessonsData.forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = l.id;
                    opt.dataset.level = l.level;
                    opt.textContent = `[${l.level}] ${l.title}`;
                    select.appendChild(opt);
                });
                document.getElementById('q-level-hint').textContent = '';
            } catch (err) {
                console.error("Ошибка загрузки уроков для вопросов:", err);
            }
        }

        function onLessonSelect() {
            const select = document.getElementById('q-lesson');
            const selectedOpt = select.options[select.selectedIndex];
            const level = selectedOpt.dataset.level;
            const hint = document.getElementById('q-level-hint');
            hint.textContent = level ? `Уровень вопроса будет автоматически установлен: ${level}` : '';
        }

        async function addLesson() {
            const title = document.getElementById('lesson-title').value.trim();
            const level = document.getElementById('lesson-level').value;
            const content_type = document.getElementById('lesson-type').value;
            const lesson_text = document.getElementById('lesson-text').value.trim();

            if (!title) return alert("Введите название урока");

            try {
                await fetch('/api/admin/add_lesson', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ level, title, lesson_text, content_type })
                });

                alert("Урок добавлен!");
                document.getElementById('lesson-title').value = '';
                document.getElementById('lesson-text').value = '';
                await loadAdminLessonsList();
                await loadLessonsForSelect();
                await loadStats();
            } catch (err) {
                console.error("Ошибка добавления урока:", err);
                alert("Не удалось добавить урок");
            }
        }

        async function addQuestion() {
            const select = document.getElementById('q-lesson');
            const lesson_id = select.value;
            const selectedOpt = select.options[select.selectedIndex];
            const level = selectedOpt.dataset.level || "A1";

            const question_text = document.getElementById('q-text').value.trim();
            const option_1 = document.getElementById('q-opt1').value.trim();
            const option_2 = document.getElementById('q-opt2').value.trim();
            const option_3 = document.getElementById('q-opt3').value.trim();
            const correct_option = parseInt(document.getElementById('q-correct').value);

            if (!lesson_id || !question_text || !option_1 || !option_2 || !option_3) {
                return alert("Заполните все поля");
            }

            try {
                await fetch('/api/admin/add_question', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        lesson_id: parseInt(lesson_id),
                        level,
                        task_type: "multiple_choice",
                        question_text,
                        option_1,
                        option_2,
                        option_3,
                        correct_option
                    })
                });

                alert("Вопрос добавлен!");
                document.getElementById('q-text').value = '';
                document.getElementById('q-opt1').value = '';
                document.getElementById('q-opt2').value = '';
                document.getElementById('q-opt3').value = '';
            } catch (err) {
                console.error("Ошибка добавления вопроса:", err);
                alert("Не удалось добавить вопрос");
            }
        }

        async function manageUser(action) {
            const input = document.getElementById('user-input').value.trim();
            if (!input) return alert("Введите ID или username");

            try {
                await fetch('/api/admin/manage_user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tg_id: input, action })
                });
                alert("Выполнено!");
                await loadStats();
            } catch (err) {
                console.error("Ошибка управления пользователем:", err);
                alert("Не удалось выполнить действие");
            }
        }

        // ====================== VOCAB ADMIN ======================

        function emojiAdminUrl(code) {
            return `https://raw.githubusercontent.com/hfg-gmuend/openmoji/master/color/svg/${code}.svg`;
        }

        function previewVocabCard() {
            const code = document.getElementById('vc-emoji').value.trim().toUpperCase();
            const word = document.getElementById('vc-word').value.trim();
            const tr   = document.getElementById('vc-translation').value.trim();

            const img = document.getElementById('vc-preview-img');
            const fallback = document.getElementById('vc-preview-emoji');

            if (code) {
                img.src = emojiAdminUrl(code);
                img.classList.remove('hidden');
                img.onerror = () => {
                    img.classList.add('hidden');
                    fallback.textContent = String.fromCodePoint(parseInt(code, 16));
                    fallback.classList.remove('hidden');
                };
            }
            document.getElementById('vc-preview-word').textContent = word || '—';
            document.getElementById('vc-preview-tr').textContent   = tr   || '';
        }

        async function addVocabCard() {
            const word  = document.getElementById('vc-word').value.trim();
            const tr    = document.getElementById('vc-translation').value.trim();
            const topic = document.getElementById('vc-topic').value.trim();
            const emoji = document.getElementById('vc-emoji').value.trim().toUpperCase();
            const level = document.getElementById('vc-level').value;
            const def   = document.getElementById('vc-definition').value.trim();
            const order = parseInt(document.getElementById('vc-order').value) || 0;
            const status = document.getElementById('vc-add-status');

            if (!word || !tr || !topic || !emoji) {
                status.textContent = '⚠️ Заполните Слово, Перевод, Тему и Emoji code';
                status.className = 'text-center text-sm mt-2 text-yellow-400';
                return;
            }

            try {
                const res = await fetch('/api/admin/vocab/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word, translation: tr, topic, emoji_code: emoji, level, definition: def, order_num: order })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    status.textContent = `✅ Добавлено! ID: ${data.id}`;
                    status.className = 'text-center text-sm mt-2 text-emerald-400';
                    ['vc-word','vc-translation','vc-emoji','vc-definition'].forEach(id => document.getElementById(id).value = '');
                    loadAdminVocab();
                } else {
                    status.textContent = '❌ Ошибка: ' + (data.detail || 'неизвестная');
                    status.className = 'text-center text-sm mt-2 text-red-400';
                }
            } catch(e) {
                status.textContent = '❌ Ошибка соединения';
                status.className = 'text-center text-sm mt-2 text-red-400';
            }
        }

        async function loadAdminVocab() {
            const list = document.getElementById('vocab-admin-list');
            list.innerHTML = '<p class="text-zinc-400 text-sm text-center py-4">Загрузка...</p>';
            try {
                const res = await fetch('/api/admin/vocab');
                const cards = await res.json();
                if (!cards.length) {
                    list.innerHTML = '<p class="text-zinc-500 text-sm text-center py-4">Карточек пока нет</p>';
                    return;
                }
                list.innerHTML = cards.map(c => `
                    <div class="flex items-center gap-3 bg-zinc-800 rounded-2xl p-3">
                        <img src="${emojiAdminUrl(c.emoji_code)}" alt="${c.word}" class="w-10 h-10 object-contain flex-shrink-0"
                             onerror="this.outerHTML='<span class=\\"text-2xl\\">' + String.fromCodePoint(parseInt('${c.emoji_code}',16)) + '</span>'">
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-white text-sm">${c.word} <span class="text-zinc-400 font-normal">— ${c.translation}</span></div>
                            <div class="text-xs text-zinc-500">${c.topic} · ${c.level}</div>
                        </div>
                        <button onclick="deleteVocabCard(${c.id})"
                            class="text-red-400 hover:text-red-300 text-xs px-3 py-1.5 bg-red-950/40 rounded-xl flex-shrink-0">🗑</button>
                    </div>
                `).join('');
            } catch(e) {
                list.innerHTML = '<p class="text-red-400 text-sm text-center py-4">Ошибка загрузки</p>';
            }
        }

        async function deleteVocabCard(id) {
            if (!confirm('Удалить карточку?')) return;
            try {
                const res = await fetch(`/api/admin/vocab/delete/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.status === 'success') loadAdminVocab();
            } catch(e) { alert('Ошибка удаления'); }
        }

        window.onload = () => {
            loadStats();
            loadLessonsForSelect();
            showTab('stats');
        };
    </script>
</body>
</html>
