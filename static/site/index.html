<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talk2Learn</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet"/>
<link href="css/main.css" rel="stylesheet"/>
</head>
<body>

<!-- ══════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-emoji">🎓</div>
      <h1>Talk2Learn</h1>
      <p>Войдите, чтобы продолжить обучение</p>
    </div>

    <!-- Step 1: email -->
    <div id="auth-step1">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="auth-email" type="email" placeholder="you@example.com" class="form-input"
          onkeydown="if(event.key==='Enter')requestCode()"/>
      </div>
      <div id="auth-error1" class="form-error hidden"></div>
      <button id="auth-email-btn" onclick="requestCode()" class="btn btn-primary btn-full btn-lg mt-8">
        Получить код →
      </button>
    </div>

    <!-- Step 2: code -->
    <div id="auth-step2" class="hidden">
      <p style="font-size:14px;color:var(--clr-txt-2);margin-bottom:16px;text-align:center">
        Код отправлен на <strong id="auth-email-display"></strong><br>
        <span style="font-size:12px;color:var(--clr-txt-3)">(в тестовом режиме смотрите логи сервера)</span>
      </p>
      <div class="form-group">
        <label class="form-label">6-значный код</label>
        <input id="auth-code" type="text" maxlength="6" placeholder="000000" class="form-input"
          style="text-align:center;letter-spacing:.3em;font-size:22px"
          onkeydown="if(event.key==='Enter')verifyCode()"/>
      </div>
      <div id="auth-error2" class="form-error hidden"></div>
      <button id="auth-verify-btn" onclick="verifyCode()" class="btn btn-accent btn-full btn-lg mt-8">
        Войти ✓
      </button>
      <button onclick="document.getElementById('auth-step1').classList.remove('hidden');document.getElementById('auth-step2').classList.add('hidden')"
        class="btn btn-ghost btn-full mt-8" style="font-size:13px">
        ← Изменить email
      </button>
    </div>

    <!-- Divider -->
    <div class="auth-divider">или</div>

    <!-- Telegram widget -->
    <div style="text-align:center">
      <script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="RoleTalkAI_bot"
        data-size="large"
        data-radius="12"
        data-onauth="onTelegramAuth(user)"
        data-request-access="write"></script>
      <p style="font-size:12px;color:var(--clr-txt-3);margin-top:8px">Войти через Telegram</p>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     APP SHELL (hidden until auth)
══════════════════════════════════════ -->
<div id="shell" class="hidden">

  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div class="sidebar-logo-text">
        <h1>Talk2Learn</h1>
        <p>Personal Tutor</p>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="avatar sidebar-avatar">T</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">Загрузка...</div>
        <div class="sidebar-user-meta">⭐ 0 XP</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item" data-page="home" onclick="APP.go('home')">
        <span class="icon">🏠</span> Главная
      </button>
      <button class="nav-item" data-page="lessons" onclick="APP.go('lessons')">
        <span class="icon">📚</span> Уроки
      </button>
      <button class="nav-item" data-page="dictionary" onclick="APP.go('dictionary')">
        <span class="icon">🃏</span> Словарь
      </button>
      <button class="nav-item" data-page="notebook" onclick="APP.go('notebook')">
        <span class="icon">📒</span> Блокнот
      </button>
      <button class="nav-item" data-page="club" onclick="APP.go('club')">
        <span class="icon">🗣️</span> Разговорный клуб
      </button>
      <button class="nav-item" data-page="situations" onclick="APP.go('situations')">
        <span class="icon">🎭</span> Ситуации
      </button>
      <button class="nav-item" data-page="profile" onclick="APP.go('profile')">
        <span class="icon">👤</span> Профиль
      </button>
    </nav>

    <div class="sidebar-goal">
      <div class="sidebar-goal-label">🎯 Дневная цель</div>
      <div class="sidebar-goal-bar"><div class="sidebar-goal-fill" style="width:0%"></div></div>
      <div class="sidebar-goal-sub">15 / 20 мин выполнено</div>
    </div>

    <button class="sidebar-logout" onclick="logout()">↩ Выйти</button>
  </nav>

  <!-- ── Main content ── -->
  <div id="main-content">

    <!-- Mobile header -->
    <header id="mobile-header">
      <div class="avatar" style="width:34px;height:34px;font-size:13px">
        <span id="mobile-avatar-letter">T</span>
      </div>
      <span id="mobile-header-title">Talk2Learn</span>
      <span id="mobile-header-xp">⭐ 0 XP</span>
    </header>

    <!-- Page content injected here by router -->
    <div id="page-container"></div>

    <!-- Mobile bottom nav -->
    <nav id="mobile-nav">
      <button class="mob-nav-btn" data-page="home" onclick="APP.go('home')">
        <span class="icon">🏠</span><span>Главная</span>
      </button>
      <button class="mob-nav-btn" data-page="dictionary" onclick="APP.go('dictionary')">
        <span class="icon">🃏</span><span>Словарь</span>
      </button>
      <button class="mob-nav-btn" data-page="club" onclick="APP.go('club')">
        <span class="icon">🗣️</span><span>Клуб</span>
      </button>
      <button class="mob-nav-btn" data-page="notebook" onclick="APP.go('notebook')">
        <span class="icon">📒</span><span>Блокнот</span>
      </button>
      <button class="mob-nav-btn" data-page="profile" onclick="APP.go('profile')">
        <span class="icon">👤</span><span>Профиль</span>
      </button>
    </nav>

  </div>
</div>

<!-- ── Word popup (global) ── -->
<div id="word-popup-overlay" onclick="UI.hideWordPopup()"></div>
<div id="word-popup">
  <div class="popup-handle"></div>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
    <div>
      <span id="pw-word" class="popup-word"></span>
      <span id="pw-transcription" class="popup-transcription"></span>
    </div>
    <button onclick="UI.hideWordPopup()" class="btn btn-ghost btn-sm" style="padding:4px 8px">✕</button>
  </div>
  <div id="pw-trans" class="popup-translation"></div>
  <div id="pw-example" class="popup-example"></div>
  <div id="pw-status" class="text-muted text-sm text-center mt-8"></div>
  <button id="pw-add-btn" onclick="addWordToDict()" class="btn btn-primary btn-full mt-12">+ В мой словарь</button>
</div>

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<!-- ── Scripts ── -->
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
